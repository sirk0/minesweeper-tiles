[project]
name = "minesweeper"
version = "0.1.0"
description = "A minesweeper clone with square, triangle and hexagon boards"
requires-python = ">=3.10"
dependencies = ["pygame-ce>=2.5"]

[project.scripts]
minesweeper = "minesweeper.gui:main"

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["minesweeper"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
