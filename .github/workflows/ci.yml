name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-test.txt
      - name: Run tests
        # GUI tests set SDL's dummy video driver themselves
        run: make test PY=python

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - name: Install dependencies
        run: pip install -r requirements-test.txt
      - name: Lint
        run: make lint PY=python
