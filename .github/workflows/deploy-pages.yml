name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # skip the automated version-bump commits
    if: github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'Bump version to')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - name: Install dependencies
        run: pip install -r requirements-web.txt
      - name: Build web bundle (pygbag, site root)
        run: make web-package PY=python
      # During the TypeScript transition the Pages artifact hosts both apps:
      # the pygbag build stays at the site root (existing URLs unchanged) and
      # the new TS build mounts under /next/. At parity the two swap.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build TypeScript app (mounts at /next/)
        working-directory: web
        env:
          VITE_BASE: /minesweeper-tiles/next/
        run: |
          npm ci
          npm run build
      - name: Compose /next/ into the Pages artifact
        run: |
          mkdir -p build/minesweeper/build/web/next
          cp -r web/dist/. build/minesweeper/build/web/next/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/minesweeper/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
