name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # skip the automated version-bump commits
    if: github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'Bump version to')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - name: Install pygbag
        run: pip install pygbag
      - name: Stage app files
        # pygbag packages the whole folder it is given, so hand it a clean
        # directory with only the game code
        run: |
          mkdir -p build/app
          cp main.py build/app/
          cp -r minesweeper build/app/
      - name: Build web bundle
        # the game has no audio, so skip the click-to-start media gate
        run: python -m pygbag --ume_block 0 --build build/app
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/app/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
